apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: device-api
  namespace: argocd
spec:
  project: staging
  source:
    repoURL: https://github.com/your-username/orbital-stack
    targetRevision: HEAD
    path: helm/charts/device-api
  destination:
    server: https://kubernetes.default.svc
    namespace: orbital-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true