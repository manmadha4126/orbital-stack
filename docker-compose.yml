version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]

  timescaledb:
    image: timescale/timescaledb:pg15
    environment:
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  registry:
    image: registry:2
    ports: ["5000:5000"]